<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRISH CHAT ROYAL</title>
    <style>
        body { background-color: #000; color: gold; font-family: sans-serif; text-align: center; margin: 0; padding: 0; }
        .header { border: 2px solid gold; padding: 20px; margin: 20px; border-radius: 15px; background: #1a1a1a; }
        .room-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; }
        .room-box { border: 2px dashed gold; padding: 15px; border-radius: 10px; background-color: #111; }
        .btn { background-color: gold; color: black; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%; }
        h1 { margin: 0; font-size: 24px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>👑 KRISH CHAT ROYAL 👑</h1>
        <p>24/7 Online Kingdom</p>
    </div>
    <div class="room-grid">
        <div class="room-box"><h3>Room 1</h3><button class="btn">JOIN</button></div>
        <div class="room-box"><h3>Room 2</h3><button class="btn">JOIN</button></div>
        <div class="room-box"><h3>Room 3</h3><button class="btn">JOIN</button></div>
        <div class="room-box"><h3>Room 4</h3><button class="btn">JOIN</button></div>
    </div>
</body>
</html>
